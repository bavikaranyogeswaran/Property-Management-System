
services:
  # Database Service (MySQL 8.0)
  db:
    image: mysql:8.0
    container_name: pms-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-pms_database}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${DB_USER:-pms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    command: >
      --innodb-buffer-pool-size=256M
      --max-connections=200
      --innodb-log-file-size=64M
      --log-bin-trust-function-creators=1
    ports:
      - "3307:3306"
    volumes:
      - pms_db_data:/var/lib/mysql
    networks:
      - pms-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Cache & Queue Service (Redis)
  redis:
    image: redis:7-alpine
    container_name: pms-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --activedefrag yes
    ports:
      - "6379:6379"
    volumes:
      - pms_redis_data:/data
    networks:
      - pms-network
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend Service (Node.js Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pms-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-pms_user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-pms_database}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - REDIS_HOST=redis
      - PORT=3000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - VITE_ENABLE_PAYMENT_SIMULATION=${VITE_ENABLE_PAYMENT_SIMULATION:-false}
      - ENABLE_PAYMENT_SIMULATION=${ENABLE_PAYMENT_SIMULATION:-false}
      - UV_THREADPOOL_SIZE=8
    ports:
      - "3000:3000"
    volumes:
      - pms_uploads_data:/app/uploads
      - pms_logs_data:/app/logs
    networks:
      - pms-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pms-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-pms_user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-pms_database}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - REDIS_HOST=redis
      - PORT=3000
      - UV_THREADPOOL_SIZE=8
    command: node worker.js
    volumes:
      - pms_uploads_data:/app/uploads
      - pms_logs_data:/app/logs
    networks:
      - pms-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Frontend Service (Vite + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:8080"
    networks:
      - pms-network
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  pms-network:
    driver: bridge

volumes:
  pms_db_data:
  pms_uploads_data:
  pms_logs_data:
  pms_redis_data:
